<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Feedback | Quetiemals</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        .feedback-container { padding: 120px 10% 80px; max-width: 800px; margin: 0 auto; text-align: center; }
        .feedback-card { background: var(--glass); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); margin-top: 30px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-family: 'Poppins', sans-serif; font-weight: 600; color: var(--gold); margin-bottom: 10px; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 1rem; transition: var(--transition); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        .sentiment-options { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .sentiment-btn { cursor: pointer; font-size: 1.5rem; transition: transform 0.2s; }
        .sentiment-btn:hover { transform: scale(1.3); }
        .btn-submit { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">QUETIEMALS</div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="story.html">Story</a></li>
                <li><a href="characters.html">Guardians</a></li>
                <li><a href="locations.html">World</a></li>
                <li><a href="feedback.html" style="color: var(--gold);">Feedback</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero lore-hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="game-title">COMMUNICATION ARRAY</h1>
                <p class="subtitle">TRANSMIT YOUR FEEDBACK</p>
            </div>
        </section>

        <section class="feedback-container">
            <div class="feedback-card reveal">
                
                <form class="silent-form" action="https://script.google.com/macros/s/AKfycbzRBUGpsvXtfUDbu5Qa3jF5p_Trh9n5VQWIAjzLpn_5gbGn0eZFAsLr6W9qUdr1Se4_/exec" method="POST">
                    
                    <input type="hidden" name="_subject" value="New Guardian Feedback!">

                    <div class="form-group">
                        <label>How is your experience in Eyuforyia?</label>
                        <div class="sentiment-options">
                            <span class="sentiment-btn" title="Terrible">💀</span>
                            <span class="sentiment-btn" title="Bad">😐</span>
                            <span class="sentiment-btn" title="Good">🔥</span>
                            <span class="sentiment-btn" title="Amazing">✨</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="name">Guardian Name</label>
                        <input type="text" id="name" name="Name" required placeholder="Enter your username">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="Email" required placeholder="guardian@email.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Topic</label>
                        <select id="subject" name="Topic">
                            <option value="General">General Feedback</option>
                            <option value="Bug">Bug Report</option>
                            <option value="Feature">Feature Request</option>
                            <option value="Lore">Lore Suggestion</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Transmission Message</label>
                        <textarea id="message" name="Message" rows="5" required placeholder="Type your message here..."></textarea>
                    </div>

                    <button type="submit" class="btn-main btn-submit">Send Transmission</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="social-links">
    <a href="https://www.facebook.com/profile.php?id=61573981297113" target="_blank">FB</a> / 
    <a href="#">IG</a> / 
    <a href="#">YT</a>
</div>
            <button class="btn-sub" onclick="location.href='../index.html'">Return Home</button>
            <p class="copyright">&copy; 2026 Quetiemals | Teq Vault</p>
        </div>
    </footer>

    <script src="../SCRIPT/script.js"></script>
</body>
</html>
