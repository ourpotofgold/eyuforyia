<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmission Received | Quetiemals</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        .success-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
        }
        .success-card {
            background: var(--glass);
            padding: 60px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            backdrop-filter: blur(20px);
            max-width: 600px;
            margin: 20px;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <main class="success-wrapper">
        <div class="success-card reveal active">
            <span class="success-icon">🛰️</span>
            <h1 class="game-title" style="font-size: 2.5rem; margin-bottom: 15px;">TRANSMISSION ENCRYPTED</h1>
            <p class="subtitle" style="margin-bottom: 30px;">Your data has reached the Resistance High Command.</p>
            <p style="color: #cbd5e1; margin-bottom: 40px;">Check your communication channels (Email) soon for further instructions, Guardian.</p>
            <button class="btn-main" onclick="location.href='../index.html'">RETURN TO BASE</button>
        </div>
    </main>
    <script src="../SCRIPT/script.js"></script>
</body>
</html>
